<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 Not Found</title>
  <style>
    body {
      margin: 0;
      background-color: #fff;
      color: #000;
      font-family: monospace;
      overflow: hidden;
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      position: relative;
    }

    #container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      width: 100%;
      height: 100%;
    }

    h1, p {
      margin: 0.2em;
      z-index: 10;
    }

    h1 {
      font-size: 5em;
    }

    #errorCode {
      font-size: 0.9em;
      color: #999;
    }

    #fakeIcon {
      position: absolute;
      width: 50px;
      height: 50px;
      background: transparent;
      border-radius: 8px;
      top: 70%;
      left: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 38px;
      color: #0f0;
      pointer-events: auto !important;
      z-index: 9999;
      outline: none;
    }

    #darkOverlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: background 0.3s ease;
      z-index: 9998;
    }
  </style>
</head>
<body>
<body>
  <div id="container">
    <h1 id="title">404</h1>
    <p id="message">Page Not Found</p>
    <p id="errorCode">Error_Code [F12ox()]</p>
  </div>

  <div id="fakeIcon" tabindex="0" role="button" aria-label="Start">⚠️</div>
  <div id="darkOverlay"></div>

  <script>
    const icon = document.getElementById('fakeIcon');
    const darkOverlay = document.getElementById('darkOverlay');
    const container = document.getElementById('container');

    let escapeCount = 0;
    const maxEscape = 5;

    icon.style.display = 'none';

    const glitchChars = [
      '𓂀', '鬽', '⍬', '؜', '𖤐', 'ꖦ', 'ན', '𒀭',
      'א', 'ع', 'ש', 'ح', '火', '焱', 'ﷺ', '𓀀'
    ];

    function getRandomGlitchText(length=10) {
      let text = '';
      for(let i=0; i<length; i++) {
        text += glitchChars[Math.floor(Math.random()*glitchChars.length)];
      }
      return text;
    }

    window.ox = function () {
      icon.style.display = 'flex';
      icon.focus();
      console.log('너는 누구야...?');
    };

    icon.addEventListener('click', () => {
      if (escapeCount >= maxEscape) return;

      escapeCount++;

      if (escapeCount === 2) {
        console.log('돌아가');
      } else if (escapeCount === 4) {
        console.log('여긴 오면 안 돼');
      }

      const margin = 40;
      const newLeft = margin + Math.random() * (window.innerWidth - margin * 2);
      const newTop = margin + Math.random() * (window.innerHeight - margin * 2);
      icon.style.left = `${newLeft}px`;
      icon.style.top = `${newTop}px`;

      const opacity = 0.2 * escapeCount;
      darkOverlay.style.background = `rgba(0,0,0,${opacity})`;
      darkOverlay.style.pointerEvents = 'auto';

      const blurValue = escapeCount * 1.5;
      container.style.filter = `blur(${blurValue}px)`;

      if (escapeCount >= maxEscape) {
        icon.style.display = 'none';

        ['title', 'message', 'errorCode'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.remove();
        });

        console.log('%c' + getRandomGlitchText(), 'color: red; font-weight: bold; font-size: 1.4em;');

        setTimeout(() => {
          window.location.href = 'game/';
        }, 2000);
      }
    });
  </script>
</body>
</html>
