<!DOCTYPE html>

<head>
<meta charset="UTF-8" />
<title>ユウ</title>
<style>

img {
  user-drag: none;
  -webkit-user-drag: none;
  user-select: none;
  pointer-events: auto;
}

canvas {
  pointer-events: none;
}

#effectCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 99999;
}

  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background-color: #111;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    overflow: auto;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 50px 20px;
    position: relative;
    z-index: 10;
  }
  h1 {
    font-size: 3rem;
    margin-bottom: 30px;
    cursor: pointer;
  }
  .glitch-effect {
    animation: glitch 0.2s infinite;
    filter: contrast(300%) saturate(0.3) hue-rotate(40deg);
    background-color: black !important;
    color: red !important;
  }
  body.glitch-effect #scaryImage {
    animation: glitch 0.2s infinite;
    filter: contrast(300%) saturate(0.3) hue-rotate(40deg);
  }
  @keyframes glitch {
    0% { transform: translate(0,0); }
    20% { transform: translate(-2px,2px); }
    40% { transform: translate(2px,-2px); }
    60% { transform: translate(-3px,1px); }
    80% { transform: translate(3px,-1px); }
    100% { transform: translate(0,0); }
  }
  #scaryImage {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 9999;
    display: none;
    opacity: 0;
    animation: showImage 1s forwards;
  }
  @keyframes showImage {
    to { opacity: 1; }
  }
  #guestbook {
    display: none;
    max-width: 720px;
    margin: 0 auto 50px auto;
    background: #222;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 0 15px rgba(0,0,0,0.8);
    text-align: left;
    color: #ddd;
    position: relative;
    z-index: 10;
  }
  #guestbook h2 {
    margin-top: 0;
    color: #fff;
    text-align: center;
  }
  #guestbook form {
    display: grid;
    grid-template-columns: 150px 1fr auto;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
    height: 80px;
  }
  #guestbook input[type="text"],
  #guestbook input[type="password"],
  #guestbook textarea {
    padding: 10px;
    border-radius: 6px;
    border: none;
    font-size: 1rem;
    font-family: inherit;
  }
  #guestbook textarea {
    resize: vertical;
    min-height: 60px;
  }
  #guestbook button {
    align-self: flex-end;
    background-color: #555;
    color: white;
    border: none;
    padding: 10px 16px;
    font-size: 1rem;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  #guestbook button:hover {
    background-color: #777;
  }
  #messages {
    max-height: 300px;
    overflow-y: auto;
    background: #111;
    padding: 10px;
    border-radius: 6px;
    font-size: 0.95rem;
    line-height: 1.3;
  }
.message-item {
  position: relative;
  padding: 8px 90px 8px 0;
  border-bottom: 1px solid #444;
  word-break: break-word;
}
.msg-buttons {
  position: absolute;
  top: 8px;
  right: 5px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  white-space: nowrap;
}
.msg-buttons button {
  padding: 1px 6px;
  min-width: 40px;
  height: 20px;
  font-size: 0.7rem;
  line-height: 1;
  border-radius: 3px;
  cursor: pointer;
  background: #444;
  color: white;
  border: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.msg-buttons button:hover {
  background: #666;
}
#particles-js {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}
#bgVideoWrapper {
  position: fixed;
  top: 50%; left: 50%;
  width: 120vw; height: 120vh;
  transform: translate(-50%, -50%) scale(1.2);
  filter: blur(12px) brightness(0.3);
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
#bgVideoWrapper iframe {
  width: 100vw;
  height: 56.25vw;
  min-height: 100vh;
  min-width: 177.77vh;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

#videoChangeWrapper {
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  align-items: center;
}
#youtubeUrlInput {
  flex-grow: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  font-size: 1rem;
  background: #333;
  color: white;
}
#youtubeUrlInput::placeholder {
  color: #aaa;
}
#changeVideoBtn {
  padding: 8px 16px;
  background-color: #555;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}
#changeVideoBtn:hover {
  background-color: #777;
}
</style>
</head>
<body>
<body style="user-select: none;">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<div id="particles-js"></div>

<div id="bgVideoWrapper"></div>

<div class="container">
  <h1 id="title">ユウ</h1>
  
  <div id="mainVideo"></div>

  <img src="https://github.com/2uji/2uji.github.io/blob/main/%EB%B4%87%EC%B9%98.png?raw=true" alt="image" id="toggleGuestbook" style="width:100%; max-width:600px; height:auto; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.6); cursor:pointer; margin-bottom:20px;">
  
  <div id="guestbook">
    <div id="videoChangeWrapper">
      <input type="text" id="youtubeUrlInput" value="https://youtu.be/WWB01IuMvzA?si=k1mv9tBi_cCBa4Lm" />
      <button id="changeVideoBtn">워프</button>
    </div>
    
    <h2></h2>
    <form id="guestbookForm" style="display: grid; grid-template-columns: 150px 1fr auto; grid-template-rows: 1fr 1fr; gap: 10px; align-items: center; margin-bottom: 20px; height: 80px;">
      <input type="text" id="nameInput" placeholder="이름" style="grid-column: 1 / 2; grid-row: 1 / 2; height: 100%; border-radius: 6px; border: none; font-size: 1rem; font-family: inherit; padding: 0 10px;" />
      <input type="password" id="passwordInput" placeholder="비밀번호" style="grid-column: 1 / 2; grid-row: 2 / 3; height: 100%; border-radius: 6px; border: none; font-size: 1rem; font-family: inherit; padding: 0 10px;" />
      <textarea id="messageInput" maxlength="280" placeholder="여긴 ㅇㅅㅇ하는 사람이 없어서 좋네" required style="grid-column: 2 / 3; grid-row: 1 / 3; height: 100%; border-radius: 6px; border: none; font-size: 1rem; font-family: inherit; padding: 10px; resize: none; overflow: auto;"></textarea>
      <button type="submit" style="grid-column: 3 / 4; grid-row: 1 / 3; height: 100%; background-color: #555; color: white; border: none; padding: 0 16px; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: background-color 0.3s ease;">우웅</button>
    </form>
    <div id="messages"></div>
  </div>
</div>

<img id="scaryImage" src="https://github.com/2uji/2uji.github.io/blob/main/12%EC%8B%9C.jpg?raw=true" alt="horror" />
<audio id="glitchSound" src="https://raw.githubusercontent.com/2uji/2uji.github.io/main/%EC%95%84%EC%98%A4%EC%98%A4%EB%8B%88.mp3" preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
  const MASTER_PASSWORD = "132434";
  const firebaseConfig = {
    apiKey: "AIzaSyBYDJH-FNykmr7h7fvc8vfUcqefDuKUjrM",
    authDomain: "guestbook-e274d.firebaseapp.com",
    projectId: "guestbook-e274d",
    storageBucket: "guestbook-e274d.firebasestorage.app",
    messagingSenderId: "352269332150",
    appId: "1:352269332150:web:c0daa16cea56622fc0c017"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const toggleBtn = document.getElementById('toggleGuestbook');
  const guestbook = document.getElementById('guestbook');
  const form = document.getElementById('guestbookForm');
  const messagesDiv = document.getElementById('messages');
  const nameInput = document.getElementById('nameInput');
  const passwordInput = document.getElementById('passwordInput');
  const messageInput = document.getElementById('messageInput');
  const title = document.getElementById('title');
  const body = document.body;
  const scaryImage = document.getElementById('scaryImage');
  const glitchSound = document.getElementById('glitchSound');
  const container = document.querySelector('.container');

  const youtubeUrlInput = document.getElementById('youtubeUrlInput');
  const changeVideoBtn = document.getElementById('changeVideoBtn');

  toggleBtn.addEventListener('click', () => {
    guestbook.style.display = guestbook.style.display === 'block' ? 'none' : 'block';
  });

  function startParticles() {
    particlesJS("particles-js", {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: { value: 0.3, random: true },
        size: { value: 2, random: true },
        line_linked: { enable: false },
        move: { enable: true, speed: 0.4, direction: "none", random: true, straight: false, out_mode: "out" }
      },
      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: false }, onclick: { enable: false }, resize: true }
      },
      retina_detect: true
    });
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      startParticles();
    }, 1000);
  });

  form.addEventListener('submit', e => {
    e.preventDefault();
    const name = nameInput.value.trim() || '익명';
    const password = passwordInput.value.trim();
    const msg = messageInput.value.trim();
    if (!msg) return;
    if (msg.length > 280) {
      alert('280자 이내만 입력 가능하긔');
      return;
    }
    db.collection('guestbook').add({
      name: name,
      password: password,
      message: msg,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      form.reset();
    });
  });

  function renderMessages(docs) {
    messagesDiv.innerHTML = '';
    docs.forEach(doc => {
      const data = doc.data();
      const timestamp = data.timestamp ? data.timestamp.toDate() : null;
      function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const hh = String(date.getHours()).padStart(2, '0');
        const mm = String(date.getMinutes()).padStart(2, '0');
        return `${y}-${m}-${d} ${hh}:${mm}`;
      }
      const timeStr = timestamp ? formatDate(timestamp) : '시간 없음';
      const div = document.createElement('div');
      div.className = 'message-item';
      div.dataset.id = doc.id;
      div.dataset.password = data.password || '';
      div.innerHTML = `<strong>${escapeHtml(data.name)}</strong> : ${escapeHtml(data.message)}<br><small style="color:#777;">${timeStr}</small>`;
      const btnsDiv = document.createElement('div');
      btnsDiv.className = 'msg-buttons';
      const editBtn = document.createElement('button');
      editBtn.textContent = '수정';
      editBtn.addEventListener('click', () => handleEdit(doc.id, data));
      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = '삭제';
      deleteBtn.addEventListener('click', () => handleDelete(doc.id, data));
      btnsDiv.appendChild(editBtn);
      btnsDiv.appendChild(deleteBtn);
      div.appendChild(btnsDiv);
      messagesDiv.appendChild(div);
    });
  }

  db.collection('guestbook').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
    renderMessages(snapshot.docs);
  });

  function handleDelete(id, data) {
    const inputPwd = prompt('비번 입력하시긔');
    if (inputPwd === null) return;
    if (inputPwd === MASTER_PASSWORD || inputPwd === data.password) {
      db.collection('guestbook').doc(id).delete();
    } else {
      alert('틀렸긔');
    }
  }

  function handleEdit(id, data) {
    const inputPwd = prompt('비번 입력하시긔');
    if (inputPwd === null) return;
    if (inputPwd === MASTER_PASSWORD || inputPwd === data.password) {
      const newMsg = prompt('메세지 수정', data.message);
      if (newMsg === null || newMsg.trim() === '') return alert('수정');
      db.collection('guestbook').doc(id).update({
        message: newMsg.trim()
      });
    } else {

function onPlayerReady(event) {
  playerReady = true;
  tryStartSync();
}

function onBgPlayerReady(event) {
  bgPlayerReady = true;
  tryStartSync();
}

function tryStartSync() {
  if (playerReady && bgPlayerReady) {
    if(syncInterval) clearInterval(syncInterval);
    syncInterval = setInterval(() => {
      const state = player.getPlayerState();
      if (state !== YT.PlayerState.PLAYING) return;

      const currentTime = player.getCurrentTime();
      const bgTime = bgPlayer.getCurrentTime();
      if (Math.abs(currentTime - bgTime) > 0.1) {
        bgPlayer.seekTo(currentTime, true);
      }
    }, 100);
  }
}

function onPlayerStateChange(event) {
  const state = event.data;

  if (state === YT.PlayerState.PAUSED) {
    bgPlayer.pauseVideo();
  } else if (state === YT.PlayerState.PLAYING) {
    bgPlayer.playVideo();
  }
}

  function extractVideoId(url) {

    const match = url.match(regex);
    return match ? match[1] : null;
  }

<canvas id="effectCanvas"></canvas>
<script>
const canvas = document.getElementById('effectCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let drawing = false;
let lastPos = null;
const particles = [];

document.addEventListener('mousedown', e => {
  drawing = true;
  lastPos = {x: e.clientX, y: e.clientY};
});
document.addEventListener('mouseup', e => drawing = false);

document.addEventListener('mousemove', e => {
  if (!drawing) return;
  const pos = {x: e.clientX, y: e.clientY};
  const dx = pos.x - lastPos.x;
  const dy = pos.y - lastPos.y;
  const dist = Math.hypot(dx, dy);
  const steps = Math.ceil(dist / 2);

  for (let i=0; i<steps; i++) {
    const x = lastPos.x + (dx/steps)*i;
    const y = lastPos.y + (dy/steps)*i;
    particles.push({
      x, y,
      radius: Math.random()*2+2,
      alpha: 1,
      decay: 0.02
    });
  }
  lastPos = pos;
});

const snowflakes = [];
for (let i=0; i<100; i++) {
  snowflakes.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*3+1,
    d: Math.random()*2
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let flake of snowflakes) {
    ctx.beginPath();
    ctx.arc(flake.x, flake.y, flake.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();
    flake.y += Math.pow(flake.d + 1, 0.5);
    if (flake.y > canvas.height) {
      flake.y = -flake.r;
      flake.x = Math.random()*canvas.width;
    }
  }

  for (let i = particles.length-1; i>=0; i--) {
    const p = particles[i];
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,100,150,${p.alpha})`;
    ctx.fill();
    p.alpha -= p.decay;
    if (p.alpha <= 0) particles.splice(i,1);
  }

  requestAnimationFrame(animate);
}
animate();

document.body.style.cursor = "url('https://github.com/2uji/2uji.github.io/blob/main/%EB%A7%88%EC%9A%B0%EC%8A%A4%EC%BB%A4%EC%84%9C.png?raw=true'), auto";
document.querySelectorAll('iframe,img,button,a,div,*').forEach(el => {
  el.style.cursor = "url('https://github.com/2uji/2uji.github.io/blob/main/%EB%A7%88%EC%9A%B0%EC%8A%A4%EC%BB%A4%EC%84%9C.png?raw=true'), auto";
});
</script>
