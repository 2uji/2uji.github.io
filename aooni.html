<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>성남</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      height: 100%;
    }

    body.shake {
      animation: shake 0.5s infinite;
    }

    @keyframes shake {
      0% { transform: translate(0px, 0px); }
      25% { transform: translate(5px, -5px); }
      50% { transform: translate(-5px, 5px); }
      75% { transform: translate(5px, 5px); }
      100% { transform: translate(0px, 0px); }
    }

    #scary-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>

  <img id="scary-image" src="https://github.com/2uji/2uji.github.io/blob/main/%EC%95%84%EC%98%A4%EC%98%A4%EB%8B%88.png?raw=true" alt="무서운 이미지">

  <audio id="scary-sound" autoplay loop>
    <source src="https://github.com/2uji/2uji.github.io/raw/refs/heads/main/%EC%95%84%EC%98%A4%EC%98%A4%EB%8B%88.mp3" type="audio/mpeg">
    브라우저가 오디오를 지원하지 않습니다.
  </audio>

  <script>
    window.onload = () => {
      document.body.classList.add('shake');
      
      const sound = document.getElementById('scary-sound');
      sound.volume = 0.8;

      sound.play().catch(() => {
        const clickToStart = () => {
          sound.play();
          document.body.removeEventListener('click', clickToStart);
        };
        document.body.addEventListener('click', clickToStart);
      });
    };
  </script>

</body>
</html>
