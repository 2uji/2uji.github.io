<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ユウ</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: black;
      overflow: hidden;
      cursor: url('https://github.com/2uji/2uji.github.io/blob/main/%EB%A7%88%EC%9A%B0%EC%8A%A4%EC%BB%A4%EC%84%9C.png?raw=true'), auto;
    }

    #secretText {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 3rem;
  font-weight: bold;
  user-select: text; 
  pointer-events: auto; 
  z-index: 0;
  font-family: 'Segoe UI', sans-serif;
}


    #hintText {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Segoe UI', sans-serif;
      font-weight: bold;
      font-size: 1.8rem;
      color: red;
      pointer-events: none;
      user-select: text;
      z-index: 3;
      animation: blinkRed 1.5s infinite alternate;
    }

    @keyframes blinkRed {
      0% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
    }

    #scratchCanvas {
      z-index: 1;
      pointer-events: auto;
    }

    #snowCanvas {
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="secretText">yuu.n-e.kr/dGVzdC5odG1s</div>
<div id="hintText">d̻̠̳̥̫̪͉͊̅̿̾̇͐̚͢͞͞͡o̷̧͍͕͙͙͔̥͕͒͗̀̍̒̋́̚̕͜͟n̴͈̲͍͇̙̭̤̠̅̊̂̽͌͘̚͟͢'̸̳̙͖͚̻̟̽̂̈͟͜͡͝t̢͍͙̫̱͕̣̠͍̒̽̈́͊͘͝͞ ļ̷͎̖̳͇̳̝̙̪̀͊̃͘͘͟͝o̧̙̳̱͕̠̻͇̐͗̈͒̒ớ̶̜͇̺͚̜̫̤̺͈̤̈́̈̃̈́̂k̢̲͔̘͐́̆̍̔͟͡͡͠</div>

<canvas id="scratchCanvas"></canvas>
<canvas id="snowCanvas"></canvas>

<script>
  const scratchCanvas = document.getElementById('scratchCanvas');
  const scratchCtx = scratchCanvas.getContext('2d');

  const snowCanvas = document.getElementById('snowCanvas');
  const snowCtx = snowCanvas.getContext('2d');

  function resizeCanvases() {
    const width = window.innerWidth;
    const height = window.innerHeight;

    scratchCanvas.width = width;
    scratchCanvas.height = height;

    snowCanvas.width = width;
    snowCanvas.height = height;

    drawBlackCover();
  }

  function drawBlackCover() {
    scratchCtx.globalCompositeOperation = 'source-over';
    scratchCtx.fillStyle = 'black';
    scratchCtx.fillRect(0, 0, scratchCanvas.width, scratchCanvas.height);
  }

  window.addEventListener('resize', resizeCanvases);
  resizeCanvases();

  const snowflakes = Array.from({ length: 100 }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 2 + 1,
    d: Math.random() * 1.5 + 0.5
  }));

  function animateSnow() {
    requestAnimationFrame(animateSnow);

    snowCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);
    snowCtx.fillStyle = 'white';

    for (let flake of snowflakes) {
      snowCtx.beginPath();
      snowCtx.arc(flake.x, flake.y, flake.r, 0, Math.PI * 2);
      snowCtx.fill();

      flake.y += flake.d;
      if (flake.y > window.innerHeight) {
        flake.y = 0;
        flake.x = Math.random() * window.innerWidth;
      }
    }
  }

  animateSnow();

  scratchCanvas.addEventListener('mousemove', (e) => {
    if (e.buttons !== 1) return;

    const x = e.clientX;
    const y = e.clientY;

    scratchCtx.globalCompositeOperation = 'destination-out';
    scratchCtx.beginPath();
    scratchCtx.arc(x, y, 30, 0, Math.PI * 2);
    scratchCtx.fill();
    scratchCtx.globalCompositeOperation = 'source-over';
  });

  const currentPath = window.location.pathname.slice(1);
  const encoded = btoa(currentPath);
  history.replaceState(null, "", "/" + encoded);
</script>

</script>

</body>
</html>
